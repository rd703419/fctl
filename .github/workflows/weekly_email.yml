name: Weekly upcoming sales email

on:
  schedule:
    # Monday 8am Eastern = Monday 13:00 UTC (accounts for EDT, UTC-4)
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  email:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send weekly email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT: rdonoghue@titleonegroup.com
        run: python weekly_email.py
