name: Scrape foreclosure listings

on:
  schedule:
    # Runs every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # Also lets you trigger it manually from the GitHub Actions tab

permissions:
  contents: write   # needed to commit the updated listings.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated listings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "Auto-update listings [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
